<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瓦楞箱报价计算器 · 浙江国立包装</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f0f2f5;min-height:100vh;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{text-align:center;font-size:1.5rem;color:#2c3e50;padding:20px 0}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,0.06)}
.card h2{font-size:1rem;color:#2c3e50;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #3498db}
.row{display:flex;flex-wrap:wrap;gap:10px}
.field{flex:1;min-width:100px}
.field label{display:block;font-size:0.78rem;color:#888;margin-bottom:3px}
.field input,.field select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;text-align:center;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:#3498db}
.check-group{display:flex;flex-wrap:wrap;gap:6px}
.check-group label{display:flex;align-items:center;gap:4px;padding:8px 14px;border:1px solid #ddd;border-radius:20px;font-size:0.85rem;cursor:pointer;background:#fafafa}
.check-group input{display:none}
.check-group label:has(input:checked){background:#e8f4fd;border-color:#3498db;color:#3498db}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;background:#3498db;color:#fff;font-size:1.1rem;cursor:pointer;margin-top:8px}
.btn:hover{background:#2980b9}
.btn-sm{padding:8px 18px;font-size:0.85rem;border-radius:6px;width:auto}
.result{background:linear-gradient(135deg,#2c3e50,#3498db);color:#fff;border-radius:10px;padding:30px;text-align:center;display:none}
.result .total{font-size:3rem;font-weight:700;margin:8px 0}
.result .unit{font-size:0.9rem;opacity:0.85}
.result .detail{font-size:0.8rem;opacity:0.75;margin-top:12px;line-height:1.8;text-align:left}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;justify-content:center;align-items:center}
.overlay.show{display:flex}
.panel{background:#fff;border-radius:16px;padding:28px;max-width:700px;width:95%;max-height:85vh;overflow-y:auto}
.panel h3{font-size:1.1rem;margin-bottom:16px}
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.set-card{background:#fafbfc;border:1px solid #e0e0e0;border-radius:10px;padding:14px}
.set-card h4{font-size:0.82rem;margin-bottom:10px;color:#2c3e50;font-weight:600}
.set-card .srow{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.set-card .srow label{font-size:0.78rem;color:#444;min-width:52px;font-weight:500}
.set-card .srow input{width:72px;padding:7px 8px;border:1px solid #d0d0d0;border-radius:5px;font-size:0.82rem;text-align:right}
.set-card .srow .unit{font-size:0.72rem;color:#999;min-width:36px}
.set-card .srow span{font-size:0.72rem;color:#888;margin:0 2px}
.footer{text-align:center;color:#aaa;font-size:0.7rem;margin-top:20px}
.auto-tag{font-size:0.7rem;color:#3498db;margin-left:4px}

.mode-tabs{display:flex;gap:0;margin-bottom:14px;border-radius:8px;overflow:hidden}
.mode-tab{flex:1;padding:12px;text-align:center;font-size:0.95rem;font-weight:600;cursor:pointer;border:none;background:#e8e8e8;color:#666;transition:all 0.2s;text-decoration:none;display:block}
.mode-tab.active{background:#3498db;color:#fff}

/* 全局 tooltip — body 级 fixed 定位，避免父容器 overflow/crop */
#globalTooltip{position:fixed;z-index:10000;background:#2c3e50;color:#fff;padding:10px 14px;border-radius:8px;font-size:0.75rem;line-height:1.7;white-space:pre-line;max-width:380px;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,0.25);opacity:0;transform:translateY(4px);transition:opacity 0.15s,transform 0.15s}
#globalTooltip.show{opacity:1;transform:translateY(0)}

#quoteTable th,#quoteTable td{padding:6px 8px;border-bottom:1px solid #eee}
#quoteTable tbody tr:hover{background:#f8f9fa}
.quote-del{color:#e74c3c;cursor:pointer;font-size:0.75rem;text-decoration:underline}
.quote-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.quote-bar .sel-count{font-size:0.8rem;color:#666;min-width:80px}
.quote-bar .sel-count span{color:#3498db;font-weight:700}
.quote-xlsx-btn{color:#27ae60;cursor:pointer;font-size:0.75rem;text-decoration:underline;margin-left:6px}
#quoteTable th.cb-col{width:36px;text-align:center}
.cb-col input[type=checkbox]{width:16px;height:16px;cursor:pointer}

  @media (max-width: 768px) {
    html{scroll-behavior:smooth;scroll-padding-top:20px}
    body{-webkit-overflow-scrolling:touch}
    .container{max-width:100%;padding:8px}
    .card{padding:10px;scroll-margin-top:20px}
    input[type=password],.field input,.field select,.panel input,.panel select{font-size:16px!important;padding:10px 8px}
    .mode-tab{font-size:0.85rem;padding:10px}
    h2{font-size:0.95rem}
    .btn{padding:12px;font-size:1rem}
    .set-grid{grid-template-columns:1fr}
    .set-card .srow input{width:60px}
    .overlay .panel{width:95%;max-height:90vh;overflow-y:auto}
  }
</style>
<script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

</head>
<body>
<div id="globalTooltip"></div>
<div class="container">
    <div class="mode-tabs"><a class="mode-tab" href="index.html">📦 彩盒报价</a><a class="mode-tab active" href="javascript:void(0)">📐 瓦楞箱报价</a></div>
<div class="card">
    <h2>📐 纸板</h2>
    <div class="row">
        <div class="field"><label>纸箱长 (cm)</label><input type="number" id="cartonL" value="" step="0.1" oninput="calcCartonBoard()"></div>
        <div class="field"><label>纸箱宽 (cm)</label><input type="number" id="cartonW" value="" step="0.1" oninput="calcCartonBoard()"></div>
        <div class="field"><label>纸箱高 (cm)</label><input type="number" id="cartonH" value="" step="0.1" oninput="calcCartonBoard()"></div>
        <div class="field"><label>盒型</label><select id="cartonType" onchange="calcCartonBoard()"><option value="normal" selected>普通</option><option value="fullcover">全盖</option><option value="zhongkai">中开</option><option value="tiandigai">天地盖</option><option value="manual">异形</option></select></div>
        <div class="field"><label>瓦楞方向</label><select id="cartonFluteDir" onchange="calcCartonBoard()"><option value="vertical" selected>竖瓦</option><option value="horizontal">横瓦</option></select></div>
    </div>
    <div class="row" style="margin-top:4px">
        <div class="field"><label>单价 (元/㎡)</label><input type="number" id="cartonPrice" value="" step="0.1"></div>
        <div class="field"><label>返点 (%)</label><input type="number" id="cartonRebate" value="10" step="1" placeholder="留空=0"></div>
        <div class="field"><label>纸板长 (cm) <span class="auto-tag">自动</span></label><input type="number" id="cartonBoardL" value="" step="0.1" placeholder="自动或手动"></div>
        <div class="field"><label>纸板宽 (cm) <span class="auto-tag">自动</span></label><input type="number" id="cartonBoardW" value="" step="0.1" placeholder="自动或手动"></div>
    </div>

</div>

<div class="card">
    <h2>⚙ 刀版 / 模切 <span id="dieCutSugg" style="font-size:0.7rem;color:#27ae60;font-weight:normal"></span></h2>
    <div class="row">
        <div class="field"><label>刀版费</label><select id="cartonDie"><option value="0" selected>不需要</option><option value="1">新版 ×250</option></select></div>
        <div class="field"><label>模切机型</label><select id="cartonDieCut" onchange="document.getElementById('cartonPieces').disabled=this.value==='0'"><option value="0" selected>不需要</option></select></div>
        <div class="field"><label>拼版数</label><div style="display:flex;gap:0"><button onclick="adjInput('cartonPieces',-1,1)" style="padding:8px 10px;border:1px solid #ddd;border-radius:6px 0 0 6px;cursor:pointer;background:#f5f5f5;font-size:0.9rem">−</button><input type="number" id="cartonPieces" value="" step="1" placeholder="不模切不填" disabled style="text-align:center;border-radius:0;border-left:0;border-right:0"><button onclick="adjInput('cartonPieces',1,1)" style="padding:8px 10px;border:1px solid #ddd;border-radius:0 6px 6px 0;cursor:pointer;background:#f5f5f5;font-size:0.9rem">+</button></div></div>
    </div>
</div>

<div class="card">
    <h2>🖨 印刷</h2>
    <div class="row">
        <div class="field"><label>印刷方式</label><select id="cartonPressType" onchange="var pr=document.getElementById('pressRow');var pa=document.getElementById('pressArea');var ba=document.getElementById('pressBaseField');var ov=document.getElementById('pressOverField');var show=this.value==='traditional';pr.style.display=show?'':'none';ba.style.display=show?'':'none';ov.style.display=show?'':'none';pa.style.display=show?'none':''"><option value="traditional">传统印刷</option><option value="area" selected>平方计价</option></select></div>
        <div class="field" id="pressRow" style="display:none"><label>色数</label><select id="cartonColors" onchange="updatePressDefaults()"><option value="1" selected>1色</option><option value="2">2色</option><option value="3">3色</option></select></div>
        <div class="field" id="pressBaseField" style="display:none"><label>上机费 (元)</label><input type="number" id="cartonPressBase" value="15" step="1"></div>
        <div class="field" id="pressOverField" style="display:none"><label>单价 (元/张)</label><input type="number" id="cartonPressOver" value="0.07" step="0.01"></div>
        <div class="field" id="pressArea"><label>平方单价 (元/㎡)</label><input type="number" id="cartonPressArea" value="0.25" step="0.01"></div>
        <div class="field"><label>柔版费 (元)</label><input type="number" id="cartonPlate" value="0" step="1"></div>
    </div>
</div>

<div class="card">
    <h2>🎨 其他</h2>
    <div class="row">
        <div class="field"><label>糊口/打钉 (元/个)</label><input type="number" id="cartonGlue" value="0" step="0.01"></div>
        <div class="field"><label>运输 (元/㎡)</label><select id="cartonTransport"><option value="无需物流">无需物流</option>
<option value="龙泉">龙泉 0.08</option>
<option value="庆元">庆元 0.12</option>
<option value="政和">政和 0.15</option>
<option value="景宁">景宁 0.15</option>
<option value="丽水">丽水 0.18</option>
<option value="建瓯">建瓯 0.25</option>
<option value="松阳">松阳 0.25</option>
<option value="0.3">0.30</option>
<option value="0.35">0.35</option></select></div>
        <div class="field"><label>损耗(张)</label><input type="number" id="cartonLoss" value="0" step="1"></div>
    </div>
    <div class="row" style="margin-top:4px">
        <div class="field"><label>数量 (个)</label><input type="number" id="quantity" value="" step="1" placeholder=""></div>
        <div class="field"><label>税率 (%)</label><div style="display:flex;gap:0"><button onclick="adjInput('taxRate',-1,0,20)" style="padding:8px 10px;border:1px solid #ddd;border-radius:6px 0 0 6px;cursor:pointer;background:#f5f5f5;font-size:0.9rem">−</button><input type="number" id="taxRate" value="7" style="text-align:center;border-radius:0;border-left:0;border-right:0"><button onclick="adjInput('taxRate',1,0,20)" style="padding:8px 10px;border:1px solid #ddd;border-radius:0 6px 6px 0;cursor:pointer;background:#f5f5f5;font-size:0.9rem">+</button></div></div>
        <div class="field"><label>毛利率 (%)</label><div style="display:flex;gap:0"><button onclick="adjInput('marginPct',-1,0,200)" style="padding:8px 10px;border:1px solid #ddd;border-radius:6px 0 0 6px;cursor:pointer;background:#f5f5f5;font-size:0.9rem">−</button><input type="number" id="marginPct" value="10" style="text-align:center;border-radius:0;border-left:0;border-right:0"><button onclick="adjInput('marginPct',1,0,200)" style="padding:8px 10px;border:1px solid #ddd;border-radius:0 6px 6px 0;cursor:pointer;background:#f5f5f5;font-size:0.9rem">+</button></div></div>
        <div class="field"><label>其他成本</label><div style="display:flex;gap:4px"><input type="number" id="extraCost" value="" step="0.001" placeholder="外加工等" style="flex:1;min-width:0"><select id="extraCostUnit" style="width:auto;padding:0 4px;height:38px;border:1.5px solid #2980b9;border-radius:3px;background:#ebf5fb;color:#2980b9;font-weight:600;font-size:0.7rem;flex-shrink:0;text-align:center"><option value="per">元/个</option><option value="total">总价</option><option value="area" selected>元/㎡</option></select></div></div>
    </div>
</div>
<div class="row" style="gap:8px"><button class="btn" onclick="calculate()" style="flex:1">💰 计算报价</button><button class="btn" id="btnSaveQuote" onclick="saveQuote()" style="flex:1;background:#e67e22;display:none">💾 保存报价</button><button class="btn" id="btnExport" onclick="exportXLS()" style="flex:1;background:#27ae60;display:none">📥 导出报价表</button></div>

<div class="result" id="result">
    <div class="unit">预估报价</div>
    <div class="total" id="totalPrice">¥ --</div>
    <div class="unit" id="unitPrice"></div>
    <div class="detail" id="breakdown"></div>
</div>

<div class="card" id="quoteHistoryCard">
    <h2>📋 报价记录</h2>
    <div class="quote-bar">
        <span class="sel-count">已选 <span id="selectedCount">0</span> 条</span>
        <span style="display:inline-flex;gap:8px;white-space:nowrap">
            <button class="btn btn-sm" onclick="exportSelectedXLSX()" style="background:#27ae60" id="btnExportSelected" disabled>📥 导出选中(xlsx)</button>
            <button class="btn btn-sm" onclick="clearQuotes()" style="background:#e74c3c">🗑 清空</button>
        </span>
    </div>
    <div style="overflow-x:auto">
        <table id="quoteTable" style="width:100%;border-collapse:collapse;font-size:0.8rem">
            <thead>
                <tr style="background:#f5f5f5">
                    <th class="cb-col" style="padding:8px;border-bottom:2px solid #ddd"><input type="checkbox" id="selectAllQuotes" onchange="toggleSelectAll(this)" title="全选/取消"></th>
                    <th style="padding:8px;border-bottom:2px solid #ddd;text-align:left">名称/时间</th>
                    <th style="padding:8px;border-bottom:2px solid #ddd;text-align:left">纸板尺寸(L×W×H)</th>
                    <th style="padding:8px;border-bottom:2px solid #ddd;text-align:left">盒型</th>
                    <th style="padding:8px;border-bottom:2px solid #ddd;text-align:right">数量</th>
                    <th style="padding:8px;border-bottom:2px solid #ddd;text-align:right">单价</th>
                    <th style="padding:8px;border-bottom:2px solid #ddd;text-align:center">操作</th>
                </tr>
            </thead>
            <tbody id="quoteTableBody"></tbody>
        </table>
    </div>
</div>

<div class="footer">2026.07.16 11:16 · <span onclick="showPwd()" style="cursor:pointer;text-decoration:underline">⚙ 设置</span></div>
</div>

<div class="overlay" id="pwdOverlay"><div class="panel" style="max-width:300px;text-align:center">
    <h3>🔐 输入密码</h3>
    <div style="display:flex;gap:8px"><input type="password" id="pwdInput" placeholder="密码" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:16px" onkeydown="if(event.key==='Enter')checkPwd()"></div>
    <button class="btn" onclick="checkPwd()" style="margin-top:12px">确认</button>
    <button onclick="document.getElementById('pwdOverlay').classList.remove('show')" style="margin-top:8px;padding:8px 30px;border:1px solid #ddd;border-radius:6px;background:#eee;cursor:pointer">取消</button>
    <p style="font-size:0.75rem;color:#e74c3c;margin-top:8px;display:none" id="pwdError">密码错误</p>
</div></div>

<div class="overlay" id="setOverlay"><div class="panel">
    <h3>⚙ 后台价格设置</h3>
    <div class="set-grid">
        <div class="set-card"><h4>🖨 印刷 (上机费,单价)</h4><div id="setPress"></div></div>
        <div class="set-card"><h4>🔪 模切</h4><div id="setDieCut"></div></div>
        <div class="set-card"><h4>🚚 运输</h4><div id="setTransport"></div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
        <button class="btn btn-sm" onclick="saveSettings()">💾 保存</button>
        <button onclick="closeSettings()" style="padding:8px 30px;border:1px solid #ddd;border-radius:6px;background:#eee;cursor:pointer">取消</button>
    </div>
</div></div>

<script>
var PRICE = {
  press: {1:[15,0.07],2:[22,0.085],3:[30,0.10]},
  dieCut: {"930手动":[35,0.08],"1100手动":[35,0.10],"1300自动":[40,0.12],"1500自动":[50,0.20],"1800手动":[50,0.30]},
  transport: {"庆元":0.12,"龙泉":0.08,"政和":0.15,"建瓯":0.25,"景宁":0.15,"丽水":0.18,"松阳":0.25,"无需物流":0,"0.3":0.3,"0.35":0.35},
  dieCutLimit: {"930手动":[90,64],"1100手动":[107,76],"1300自动":[127,97],"1500自动":[147,107],"1800手动":[178,126]}
};
var SET_PWD='+987';

adjInput=function(id,d,min,max){var el=document.getElementById(id);var v=parseInt(el.value)||0;v+=d;if(min!==undefined&&v<min)v=min;if(max!==undefined&&v>max)v=max;el.value=v;};
function updatePressDefaults(){
  var cn=document.getElementById('cartonColors').value;
  var d=PRICE.press[cn];
  document.getElementById('cartonPressBase').value=d[0];
  document.getElementById('cartonPressOver').value=d[1];
}
function calcCartonBoard(){
  var type=document.getElementById('cartonType').value;
  if(type==='manual')return;
  var l=parseFloat(document.getElementById('cartonL').value)||0;
  var w=parseFloat(document.getElementById('cartonW').value)||0;
  var h=parseFloat(document.getElementById('cartonH').value)||0;
  if(document.getElementById('cartonType').value!=='manual'&&(!l||!w||!h))return;
  var boardL,boardW;
  if(type==='zhongkai'){boardL=h*2+l;boardW=w+h+w+h;}
  else if(type==='tiandigai'){boardL=l+2*h;boardW=2*h+w;}
  else if(type==='fullcover'){boardL=(l+w)*2+3.5;boardW=w+h+w;}
  else{boardL=(l+w)*2+3.5;boardW=w+h+0.4;}
  var dir=document.getElementById('cartonFluteDir').value;
  if(dir==='vertical'){boardW+=2;}else{var tmp=boardL;boardL=boardW;boardW=tmp+2;}
  document.getElementById('cartonBoardL').value=boardL.toFixed(1);
  document.getElementById('cartonBoardW').value=boardW.toFixed(1);
  // 模切机型建议
  var bl=boardL,bw=boardW,best=null;
  Object.keys(PRICE.dieCutLimit).forEach(function(k){
    var lim=PRICE.dieCutLimit[k];
    if(bl<=lim[0]&&bw<=lim[1]&&!best)best=k;
  });
  document.getElementById('dieCutSugg').textContent=best?'→ 建议: '+best:'→ 超出最大机型';
}

function calculate(){
  var l=parseFloat(document.getElementById('cartonL').value)||0;
  var w=parseFloat(document.getElementById('cartonW').value)||0;
  var h=parseFloat(document.getElementById('cartonH').value)||0;
  if(document.getElementById('cartonType').value!=='manual'&&(!l||!w||!h))return;
  var price=parseFloat(document.getElementById('cartonPrice').value)||0;
  if(document.getElementById('cartonType').value!=='manual'&&!price)return;
  var qty=parseInt(document.getElementById('quantity').value);if(isNaN(qty))qty=1;
  
  var pieces=parseInt(document.getElementById('cartonPieces').value);if(isNaN(pieces))pieces=1;
  var totalSheets=Math.ceil(qty/pieces);
  var loss=parseFloat(document.getElementById('cartonLoss').value)||0;
  var lossMul=(totalSheets+loss)/totalSheets||1;
  
  var boardL=parseFloat(document.getElementById('cartonBoardL').value)||0;
  var boardW=parseFloat(document.getElementById('cartonBoardW').value)||0;
  if(!boardL||!boardW)return;
  var rebate=parseFloat(document.getElementById('cartonRebate').value)||0;
  var effPrice=price*(1-rebate/100);
  var boardArea=boardL*boardW/10000;
  var boardCost=boardArea*effPrice*lossMul;
  var boardTotal=boardCost*totalSheets;
  var priceUsed=rebate>0?effPrice:price;
  
  // Die + dieCut
  var dieFee=parseInt(document.getElementById('cartonDie').value)?boardArea*250:0;
  var dcKey=document.getElementById('cartonDieCut').value;
  var dc=dcKey==='0'?[0,0]:(PRICE.dieCut[dcKey]||[0,0]);
  var dieCutCost=dcKey==='0'?0:(dc[0]+dc[1]*totalSheets);
  
  // Press
  var cn=document.getElementById('cartonColors').value;
  var pressType=document.getElementById('cartonPressType').value;
  var pressCost=0;
  var base=parseFloat(document.getElementById('cartonPressBase').value);if(isNaN(base))base=15;
  var over=parseFloat(document.getElementById('cartonPressOver').value);if(isNaN(over))over=0.07;
  if(pressType==='traditional'){pressCost=base+over*totalSheets;}else{var areaPrice=parseFloat(document.getElementById('cartonPressArea').value);if(isNaN(areaPrice))areaPrice=0.25;pressCost=areaPrice*boardArea*totalSheets;}
  
  // Glue
  var plateFee=parseFloat(document.getElementById('cartonPlate').value)||0;
  var gluePrice=parseFloat(document.getElementById('cartonGlue').value);
  if(isNaN(gluePrice))gluePrice=0;
  var glueCost=gluePrice*qty;
  
  // Transport
  var tsKey=document.getElementById('cartonTransport').value;
  var tsPrice=PRICE.transport[tsKey]||0;
  var tsCost=tsPrice*boardArea*totalSheets;
  
  // Extra
  var extraVal=parseFloat(document.getElementById('extraCost').value)||0;
  var extraUnitSel=document.getElementById('extraCostUnit');var extraUnit=extraUnitSel.options[extraUnitSel.selectedIndex].text;
  var extraCost=extraUnit==='元/个'?extraVal*qty:extraUnit==='元/㎡'?extraVal*boardArea*totalSheets:extraVal;
  var pressAreaVal=parseFloat(document.getElementById('cartonPressArea').value);if(isNaN(pressAreaVal))pressAreaVal=0.25;
  window._costs={
      board:boardTotal,die:dieFee,dieCut:dieCutCost,press:pressCost,
      plate:plateFee,glue:glueCost,transport:tsCost,extra:extraCost,
      boardArea:boardArea,boardPrice:price,lossMul:lossMul,
      qty:qty,totalSheets:totalSheets,
      dieKey:dcKey,tsKey:tsKey,
      pressType:pressType,pressBase:base,pressOver:over,pressColor:cn,
      gluePrice:gluePrice,tsPrice:tsPrice,
      l:l,w:w,h:h,type:document.getElementById('cartonType').options[document.getElementById('cartonType').selectedIndex].text,
      fluteDir:document.getElementById('cartonFluteDir').options[document.getElementById('cartonFluteDir').selectedIndex].text,
      rebate:rebate,pieces:pieces,loss:loss,
      pressArea:pressAreaVal,
      extraUnit:extraUnit,extraVal:extraVal,
      dieNeed:document.getElementById('cartonDie').value==='1'?'需要':'不需要'
  };
  var allCost=boardTotal+dieFee+dieCutCost+pressCost+plateFee+glueCost+tsCost+extraCost;
  var cpu=allCost/qty;
  var taxVal=document.getElementById('taxRate').value;
  var taxPct=taxVal===''?13:parseInt(taxVal)||0;
  var marginPct=parseInt(document.getElementById('marginPct').value)||0;
  var tax=taxPct/100,margin=marginPct/100;
  var taxPrice=cpu*(1+tax);
  var sp=taxPrice/(1-margin);
  var total=sp*qty;
  window._costs.sp=sp;window._costs.total=total;window._costs.taxPct=taxPct;window._costs.marginPct=marginPct;window._costs.allCost=allCost;
  
  document.getElementById('result').style.display='block';document.getElementById('btnExport').style.display='block';document.getElementById('btnSaveQuote').style.display='block';
  document.getElementById('totalPrice').textContent='¥ '+total.toFixed(2);
  document.getElementById('unitPrice').textContent='单价 ¥ '+sp.toFixed(4)+'/个（含税'+taxPct+'% 毛利率'+marginPct+'%）';
  
  
  var lines=[];
  lines.push('【纸板】'+l.toFixed(1)+'×'+w.toFixed(1)+'×'+h.toFixed(1)+'cm ');
  lines.push('  盒型: '+document.getElementById('cartonType').options[document.getElementById('cartonType').selectedIndex].text);
  lines.push('  纸板: '+boardL.toFixed(1)+'×'+boardW.toFixed(1)+'cm = '+boardArea.toFixed(4)+'㎡');
  var joinLabel=document.getElementById('cartonJoin')?'':'';
  if(document.getElementById('cartonType').value!=='manual'&&l&&w&&h){
    var ct=document.getElementById('cartonType').value;
    var rawL,rawW,fl,fw;
    if(ct==='zhongkai'){rawL=h*2+l;rawW=w+h+w+h;fl='  长='+h.toFixed(1)+'×2+'+l.toFixed(1)+'='+rawL.toFixed(1);fw='  宽='+w.toFixed(1)+'+'+h.toFixed(1)+'+'+w.toFixed(1)+'+'+h.toFixed(1)+'='+rawW.toFixed(1);}
    else if(ct==='tiandigai'){rawL=l+2*h;rawW=2*h+w;fl='  长='+l.toFixed(1)+'+2×'+h.toFixed(1)+'='+rawL.toFixed(1);fw='  宽=2×'+h.toFixed(1)+'+'+w.toFixed(1)+'='+rawW.toFixed(1);}
    else if(ct==='fullcover'){rawL=(l+w)*2+3.5;rawW=w+h+w;fl='  长=('+l.toFixed(1)+'+'+w.toFixed(1)+')×2+3.5='+rawL.toFixed(1);fw='  宽='+w.toFixed(1)+'+'+h.toFixed(1)+'+'+w.toFixed(1)+'='+rawW.toFixed(1);}
    else{rawL=(l+w)*2+3.5;rawW=w+h+0.4;fl='  长=('+l.toFixed(1)+'+'+w.toFixed(1)+')×2+3.5='+rawL.toFixed(1);fw='  宽='+w.toFixed(1)+'+'+h.toFixed(1)+'+0.4='+rawW.toFixed(1);}
    var dir=document.getElementById('cartonFluteDir').value;
    if(dir==='vertical'){fw+=' +2cm='+(rawW+2).toFixed(1);lines.push(fl);lines.push(fw);}
    else{lines.push(fw);lines.push(fl+' +2cm='+(rawL+2).toFixed(1)+' (横瓦调换)');}
  }
  lines.push('  单价¥'+price.toFixed(2)+(rebate>0?' 返点'+rebate+'%→¥'+effPrice.toFixed(2):'')+'/㎡ × '+lossMul.toFixed(4)+' = ¥'+boardCost.toFixed(4)+'/张 × '+totalSheets+'张 = ¥'+boardTotal.toFixed(2)+' → ¥'+(boardTotal/qty).toFixed(4)+'/个');
  lines.push('');
  
  if(dieFee>0){lines.push('【刀版】新版 '+boardArea.toFixed(4)+'㎡×200=¥'+dieFee.toFixed(2)+' → ¥'+(dieFee/qty).toFixed(4)+'/个');lines.push('');}
  if(dcKey!=='0'){lines.push('【模切】'+dcKey+' 装版¥'+dc[0]+' + ¥'+dc[1]+'/张×'+totalSheets+'=¥'+dieCutCost.toFixed(2)+' → ¥'+(dieCutCost/qty).toFixed(4)+'/个');lines.push('');}
  
  if(pressType==='area'){var ap=parseFloat(document.getElementById('cartonPressArea').value);if(isNaN(ap))ap=0.25;lines.push('【印刷】平方计价 ¥'+ap.toFixed(2)+'/㎡ × '+boardArea.toFixed(4)+'㎡ × '+totalSheets+'张 = ¥'+pressCost.toFixed(2)+' → ¥'+(pressCost/qty).toFixed(4)+'/个');}else{
    var cn=document.getElementById('cartonColors').value;
    lines.push('【印刷】传统 '+cn+'色 上机¥'+base+' 单价¥'+over);
    lines.push('  上机¥'+base+' + ¥'+over+'×'+totalSheets+'张 = ¥'+pressCost.toFixed(2)+' → ¥'+(pressCost/qty).toFixed(4)+'/个');
  }
  lines.push('');
  if(plateFee>0){lines.push('【柔版】¥'+plateFee.toFixed(2)+' → ¥'+(plateFee/qty).toFixed(4)+'/个');lines.push('');}
  lines.push('【糊口/打钉】¥'+gluePrice.toFixed(2)+'/个 × '+qty+'个 = ¥'+glueCost.toFixed(2));
  lines.push('');
  if(tsPrice>0){lines.push('【运输】'+tsKey+' ¥'+tsPrice.toFixed(2)+'/㎡ × '+boardArea.toFixed(4)+'㎡ × '+totalSheets+'张 = ¥'+tsCost.toFixed(2)+' → ¥'+(tsCost/qty).toFixed(4)+'/个');lines.push('');}
  if(extraCost>0){
    if(extraUnit==='元/个'){
      lines.push('【其他成本】¥'+extraVal.toFixed(4)+'/个 × '+qty+'个 = ¥'+extraCost.toFixed(2)+' → ¥'+(extraCost/totalSheets).toFixed(4)+'/张 → ¥'+extraVal.toFixed(4)+'/个');
    }else if(extraUnit==='元/㎡'){
      lines.push('【其他成本】¥'+extraVal.toFixed(2)+'/㎡ × '+boardArea.toFixed(4)+'㎡ × '+totalSheets+'张 = ¥'+extraCost.toFixed(2)+' → ¥'+(extraCost/totalSheets).toFixed(4)+'/张 → ¥'+(extraCost/qty).toFixed(4)+'/个');
    }else{
      lines.push('【其他成本】总价 ¥'+extraCost.toFixed(2)+' → ¥'+(extraCost/qty).toFixed(4)+'/个');
    }
    lines.push('');
  }
  
  lines.push('<hr>');
  lines.push('纸板 ¥'+boardTotal.toFixed(2)+' + 刀版 ¥'+dieFee.toFixed(2)+' + 模切 ¥'+dieCutCost.toFixed(2)+' + 印刷 ¥'+pressCost.toFixed(2)+' + 柔版 ¥'+plateFee.toFixed(2)+' + 糊口 ¥'+glueCost.toFixed(2)+' + 运输 ¥'+tsCost.toFixed(2)+' + 其他 ¥'+extraCost.toFixed(2)+'  + 柔版 ¥'+plateFee.toFixed(2)+' = <b>合计 ¥'+allCost.toFixed(2)+'</b>');
  lines.push('<hr>');
  lines.push('成本价 ¥'+cpu.toFixed(4)+'/个');
  lines.push('含税价 ¥'+taxPrice.toFixed(4)+'/个');
  lines.push('含毛利 ¥'+sp.toFixed(4)+'/个');
  lines.push('总价 ¥'+total.toFixed(2)+' ('+qty+'个)');
  document.getElementById('breakdown').innerHTML=lines.join('<br>');
}

function exportXLS(){

  if(!C.qty)return;
  var date=new Date().toLocaleDateString('zh-CN');
  var l='<td class="xl70" height="22" style="height:22px">';
  var r='<td class="xl72" height="22" style="height:22px" x:num>';
  var st=' style="height:22px"';
  var costRows=[];
  if(C.board>0)costRows.push({name:'纸板-'+document.getElementById('cartonBoardL').value+' x '+document.getElementById('cartonBoardW').value+'cm',val:C.board});
  if(C.die>0)costRows.push({name:'刀版',val:C.die});
  if(C.dieCut>0)costRows.push({name:'模切-'+C.dieKey,val:C.dieCut});
  if(C.plate>0)costRows.push({name:'柔版',val:C.plate});
  var colors=document.getElementById('cartonColors').value;
  if(C.press>0)costRows.push({name:'印刷-传统'+colors+'色',val:C.press});
  else if(C.board>0)costRows.push({name:'印刷-平方计价',val:0});
  if(C.glue>0)costRows.push({name:'糊口/打钉',val:C.glue});
  if(C.transport>0)costRows.push({name:'运输-'+C.tsKey,val:C.transport});
  if(C.extra>0){var eu=document.getElementById('extraCostUnit');costRows.push({name:'其他成本-'+eu.options[eu.selectedIndex].text,val:C.extra});}
  var totalCost=0;
  costRows.forEach(function(r){totalCost+=r.val;});

  var taxVal=document.getElementById('taxRate').value;
  var taxPct=taxVal===''?13:parseInt(taxVal)||0;
  var marginVal=document.getElementById('marginPct').value;
  var marginPct=marginVal===''?0:parseInt(marginVal)||0;
  var taxPrice=singleCost*(1+taxPct/100);
  var finalPrice=marginPct>0?taxPrice/(1-marginPct/100):taxPrice;
  var body='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>.xl68{color:#FFF;font-size:14px;font-weight:700;text-align:center;background:#2F5496;border:.5pt solid #000;padding:6px}.xl70{font-size:11px;font-weight:700;color:#333;border:.5pt solid #000;padding:4px 8px;background:#F2F2F2}.xl72{font-size:11px;text-align:right;border:.5pt solid #000;padding:4px 8px}.xl73{color:#FFF;font-size:11px;font-weight:700;text-align:center;background:#2F5496;border:.5pt solid #000;padding:4px}.xl77{font-size:12px;font-weight:700;text-align:right;border:.5pt solid #000;padding:4px 8px}tr{height:22px}';
  body+='</style></head><body><table border="1" style="border-collapse:collapse">';
  body+='<tr><td class="xl68" colspan="2" height="28">浙江国立包装有限公司 瓦楞箱报价表</td></tr>';
  body+='<tr'+st+'>'+l+'日期</td><td class="xl72">'+date+'</td></tr>';
  body+='<tr'+st+'>'+l+'数量</td>'+r+C.qty+'</td></tr>';
  body+='<tr'+st+'>'+l+'纸箱尺寸</td><td class="xl72">'+C.l.toFixed(0)+' x '+C.w.toFixed(0)+' x '+C.h.toFixed(0)+' cm</td></tr>';
  body+='<tr'+st+'>'+l+'盒型</td><td class="xl72">'+C.type+'</td></tr>';
  body+='<tr><td class="xl73" colspan="2" height="24">成本明细</td></tr>';
  body+='<tr'+st+'>'+l+'工序</td><td class="xl70" style="text-align:right">小计(元)</td></tr>';
  for(var i=0;i<costRows.length;i++){body+='<tr'+st+'>'+l+costRows[i].name+'</td>'+r+costRows[i].val.toFixed(4)+'</td></tr>';}
  var startRow=8,endRow=7+costRows.length;
  body+='<tr><td class="xl73" colspan="2" height="24">报价汇总</td></tr>';
  body+='<tr'+st+'>'+l+'总价</td><td class="xl77" x:fmla="=SUM(B'+startRow+':B'+endRow+')" x:num="'+totalCost.toFixed(4)+'">￥'+totalCost.toFixed(2)+'</td></tr>';
  body+='<tr'+st+'>'+l+'单个成本</td><td class="xl77" x:fmla="=B'+(endRow+2)+'/B3" x:num="'+singleCost.toFixed(4)+'">￥'+singleCost.toFixed(2)+'</td></tr>';
  body+='<tr'+st+'>'+l+'含税'+taxPct+'%</td><td class="xl77" x:fmla="=B'+(endRow+3)+'*(1+'+taxPct+'/100)" x:num="'+taxPrice.toFixed(4)+'">￥'+taxPrice.toFixed(2)+'</td></tr>';
  body+='<tr'+st+'>'+l+'毛利'+marginPct+'%</td><td class="xl77" x:fmla="=B'+(endRow+4)+'/(1-'+marginPct+'/100)" x:num="'+finalPrice.toFixed(4)+'">￥'+finalPrice.toFixed(2)+'</td></tr>';
  body+='</table></body></html>';
  var blob=new Blob([body],{type:'application/vnd.ms-excel;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='瓦楞报价_'+new Date().toISOString().slice(0,10)+'.xls';
  a.click();
}

function saveQuote(){
  var C=window._costs||{};
  if(!C.qty||!C.sp)return;
  var name=prompt('请输入报价名称（如：客户名-产品名）：','报价_'+(loadQuotes().length+1));
  if(!name||!name.trim())return;
  name=name.trim();
  var quotes=JSON.parse(localStorage.getItem('cartonBoxHistory')||'[]');
  quotes.push({
    name: name,
    time: new Date().toLocaleString('zh-CN'),
    l: C.l, w: C.w, h: C.h,
    type: C.type,
    fluteDir: C.fluteDir,
    boardPrice: C.boardPrice,
    rebate: C.rebate,
    qty: C.qty,
    pieces: C.pieces,
    loss: C.loss,
    pressType: C.pressType,
    pressColor: C.pressColor,
    pressBase: C.pressBase,
    pressOver: C.pressOver,
    pressArea: C.pressArea,
    plate: C.plate,
    dieNeed: C.dieNeed,
    dieKey: C.dieKey,
    gluePrice: C.gluePrice,
    tsKey: C.tsKey,
    taxPct: C.taxPct,
    marginPct: C.marginPct,
    extraMode: C.extraUnit,
    extraAmt: C.extraVal,
    board: C.board,
    pressFee: C.press,
    plateFee: C.plate,
    dieFee: C.die,
    dieCutFee: C.dieCut,
    glueFee: C.glue,
    transportFee: C.transport,
    extraFee: C.extra,
    allCost: C.allCost,
    sp: C.sp,
    total: C.total
  });
  localStorage.setItem('cartonBoxHistory',JSON.stringify(quotes));
  renderQuoteTable();
}
function loadQuotes(){
  return JSON.parse(localStorage.getItem('cartonBoxHistory')||'[]');
}

  var tbody=document.getElementById('quoteTableBody');
  if(!quotes.length){
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:#aaa;padding:20px">暂无记录</td></tr>';
    document.getElementById('selectAllQuotes').checked=false;
    updateSelectedCount();
    return;
  }
  tbody.innerHTML=quotes.map(function(q,i){
    var size=(q.l||0).toFixed(1)+'×'+(q.w||0).toFixed(1)+'×'+(q.h||0).toFixed(1);
    var label=q.name?q.name+'<br><span style="font-size:0.7rem;color:#999">'+q.time+'</span>':q.time;
    var tooltip=[
      'L:'+(q.l||0).toFixed(1)+' W:'+(q.w||0).toFixed(1)+' H:'+(q.h||0).toFixed(1),
      '盒型:'+(q.type||''),
      '瓦楞方向:'+(q.fluteDir||''),
      '纸板单价:¥'+(q.boardPrice||0).toFixed(2),
      '返点:'+(q.rebate||0)+'%',
      '数量:'+(q.qty||0),
      '拼板数:'+(q.pieces||0),
      '损耗:'+(q.loss||0)+'张',
      '印刷模式:'+(q.pressType||''),
      '颜色数:'+(q.pressColor||'')+'色',
      '上机费:¥'+(q.pressBase||0).toFixed(2),
      '超量单价:¥'+(q.pressOver||0).toFixed(2),
      '平方计价单价:¥'+(q.pressArea||0).toFixed(2),
      '柔版费:¥'+(q.plate||0).toFixed(2),
      '刀版:'+(q.dieNeed||''),
      '模切机型:'+(q.dieKey||''),
      '糊口单价:¥'+(q.gluePrice||0).toFixed(2),
      '运输区域:'+(q.tsKey||''),
      '税率:'+(q.taxPct||0)+'%',
      '毛利率:'+(q.marginPct||0)+'%',
      '其他成本模式:'+(q.extraMode||''),
      '其他成本金额:'+(q.extraAmt||0).toFixed(2),
      '纸板小计:¥'+(q.board||0).toFixed(2),
      '印刷费:¥'+(q.pressFee||0).toFixed(2),
      '柔版费:¥'+(q.plateFee||0).toFixed(2),
      '刀版费:¥'+(q.dieFee||0).toFixed(2),
      '模切费:¥'+(q.dieCutFee||0).toFixed(2),
      '糊口费:¥'+(q.glueFee||0).toFixed(2),
      '运输费:¥'+(q.transportFee||0).toFixed(2),
      '其他成本:¥'+(q.extraFee||0).toFixed(2),
      '总成本:¥'+(q.allCost||0).toFixed(2)
    ].join('\n');
    return '<tr data-tooltip="'+tooltip.replace(/"/g,'&quot;')+'" onmouseenter="showTooltip(event,this)" onmouseleave="hideTooltip()">'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:center"><input type="checkbox" class="quote-cb" data-idx="'+i+'" onchange="updateSelectedCount()"></td>'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee">'+label+'</td>'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee">'+size+'</td>'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee">'+(q.type||'')+'</td>'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right">'+(q.qty||0)+'</td>'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right">¥'+(((q.allCost||0)/(q.qty||1)).toFixed(4))+'</td>'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:center;white-space:nowrap"><span class="quote-xlsx-btn" onclick="exportSingleXLSX('+i+')">📥xlsx</span> <span class="quote-del" onclick="deleteQuote('+i+')">删除</span></td>'+
      '</tr>';
  }).join('');
  document.getElementById('selectAllQuotes').checked=false;
  updateSelectedCount();
}
function deleteQuote(index){
  if(!confirm('确定删除这条报价记录？'))return;
  var quotes=loadQuotes();
  quotes.splice(index,1);
  localStorage.setItem('cartonBoxHistory',JSON.stringify(quotes));
  renderQuoteTable();
}
function clearQuotes(){

  data.push(['瓦楞方向',q.fluteDir||'']);
  data.push(['数量',q.qty||0]);
  data.push(['纸板单价','¥'+(q.boardPrice||0).toFixed(2)+(q.rebate>0?'(返点'+(q.rebate||0)+'%)':'')]);
  data.push(['拼版数',q.pieces||0]);
  data.push(['损耗',(q.loss||0)+'张']);

  if((q.dieFee||0)>0)data.push(['刀版',(q.dieFee||0).toFixed(4)]);
  if((q.dieCutFee||0)>0)data.push(['模切-'+(q.dieKey||''),(q.dieCutFee||0).toFixed(4)]);
  if((q.pressFee||0)>0)data.push(['印刷-'+(q.pressColor||'')+'色',(q.pressFee||0).toFixed(4)]);
  if((q.plateFee||0)>0)data.push(['柔版',(q.plateFee||0).toFixed(4)]);
  if((q.glueFee||0)>0)data.push(['糊口/打钉',(q.glueFee||0).toFixed(4)]);
  if((q.transportFee||0)>0)data.push(['运输-'+(q.tsKey||''),(q.transportFee||0).toFixed(4)]);
  if((q.extraFee||0)>0)data.push(['其他成本-'+(q.extraMode||''),(q.extraFee||0).toFixed(4)]);
  data.push([]);
  data.push(['报价汇总','']);
  data.push(['总成本','¥'+(q.allCost||0).toFixed(2)]);
  data.push(['数量(个)',q.qty||0]);
  data.push(['含税含利单价','¥'+((q.sp||0).toFixed(4))]);

}

function exportSelectedXLSX(){
  var checked=document.querySelectorAll('.quote-cb:checked');
  if(!checked.length){alert('请先勾选要导出的记录');return;}
  var indices=Array.from(checked).map(function(cb){return parseInt(cb.dataset.idx);});
  indices.sort(function(a,b){return a-b;});
  var quotes=loadQuotes();
  var wb=XLSX.utils.book_new();
  // Cell style definitions for xlsx-js-style
  var headerFill={fgColor:{rgb:"2F5496"}};
  var thinBorder={top:{style:"thin",color:{rgb:"000000"}},bottom:{style:"thin",color:{rgb:"000000"}},left:{style:"thin",color:{rgb:"000000"}},right:{style:"thin",color:{rgb:"000000"}}};
  var titleS={font:{bold:true,color:{rgb:"FFFFFF"},sz:14},fill:headerFill,alignment:{horizontal:"center",vertical:"center"},border:thinBorder};
  var secS={font:{bold:true,color:{rgb:"FFFFFF"},sz:11},fill:headerFill,alignment:{horizontal:"center",vertical:"center"},border:thinBorder};
  var labelS={font:{bold:true,color:{rgb:"333333"},sz:11},fill:{fgColor:{rgb:"F2F2F2"}},border:thinBorder,alignment:{vertical:"center"}};
  var valS={font:{sz:11},border:thinBorder,alignment:{horizontal:"right",vertical:"center"}};
  indices.forEach(function(idx){
    var q=quotes[idx];
    var data=buildQuoteSheet(q);
    var ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:20},{wch:40}];
    // Apply cell styles
    var range=XLSX.utils.decode_range(ws['!ref']);
    for(var R=range.s.r;R<=range.e.r;R++){
      for(var C=range.s.c;C<=range.e.c;C++){
        var addr=XLSX.utils.encode_cell({r:R,c:C});
        if(!ws[addr])continue;
        var cell=ws[addr];
        var val=(cell.v!==undefined?String(cell.v):'');
        if(R===0){cell.s=titleS;}
        else if(val==='成本明细'||val==='小计(元)'||val==='报价汇总'){cell.s=secS;}
        else if(C===0){cell.s=labelS;}
        else{cell.s=valS;}
      }
    }
    // Merge title row across both columns
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:1}}];
    var sheetName=(q.name||('报价'+(idx+1))).substring(0,31);
    var origName=sheetName;
    var suffix=1;
    while(wb.SheetNames.indexOf(sheetName)>=0){
      sheetName=origName.substring(0,28)+'_'+suffix;
      suffix++;
    }
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  });
  XLSX.writeFile(wb,'瓦楞报价_多选_'+new Date().toISOString().slice(0,10)+'.xlsx');
}
/* === 全局 tooltip === */
function showTooltip(e, row) {
  var tip = document.getElementById('globalTooltip');
  if (!tip || !row) return;
  tip.textContent = row.getAttribute('data-tooltip') || '';
  tip.classList.add('show');
  positionGlobalTip(e, tip);
}
function hideTooltip() {
  var tip = document.getElementById('globalTooltip');
  if (tip) tip.classList.remove('show');
}
// Global mousemove for smooth tracking while tooltip is visible
document.addEventListener('mousemove', function(e) {
  var tip = document.getElementById('globalTooltip');
  if (!tip || !tip.classList.contains('show')) return;
  positionGlobalTip(e, tip);
});
function positionGlobalTip(e, tip) {
  var x = e.clientX + 16, y = e.clientY + 12;
  var tw = tip.offsetWidth || 380;
  if (x + tw > window.innerWidth - 10) x = window.innerWidth - tw - 10;
  var th = tip.offsetHeight || 200;
  if (y + th > window.innerHeight - 10) y = e.clientY - th - 8;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
